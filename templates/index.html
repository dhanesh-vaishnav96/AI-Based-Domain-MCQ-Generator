<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI-MCQ-Generator</title>

    <!-- CACHE FIX -->
    <link rel="stylesheet" href="/static/style.css?v=5">
</head>

<body>

<div class="container">
    <div class="card">
        <h1>AI-Based Question Generator</h1>
        <p class="subtitle">Generate MCQs & Download Instantly</p>

        <form id="mcqForm">

            <label>Domain</label>
            <select name="domain" required>
                <option value="" disabled selected>Select Domain</option>

                <optgroup label="Programming Languages">
                    <option value="Python">Python</option>
                    <option value="Java">Java</option>
                    <option value="PHP Developer">PHP Developer</option>
                    <option value=".NET Developer">.NET Developer</option>
                </optgroup>

                <optgroup label="Full Stack / Web Development">
                    <option value="MERN Developer">MERN Developer</option>
                </optgroup>

                <optgroup label="AI / Machine Learning">
                    <option value="Gen-AI Engineer">Gen-AI Engineer</option>
                    <option value="AI/ML Engineer">AI/ML Engineer</option>
                </optgroup>

                <optgroup label="Data Engineering">
                    <option value="Data Engineer">Data Engineer</option>
                </optgroup>

                <optgroup label="Cloud & DevOps">
                    <option value="Cloud Engineer">Cloud Engineer</option>
                    <option value="DevOps">DevOps</option>
                </optgroup>

                <optgroup label="Testing & QA">
                    <option value="Quality Assurance">Quality Assurance</option>
                </optgroup>

                <optgroup label="Business & Support">
                    <option value="Business Analyst (Tech)">Business Analyst (Tech)</option>
                    <option value="Technical Support Engineer">Technical Support Engineer</option>
                </optgroup>

                <optgroup label="Networking">
                    <option value="Network Engineer">Network Engineer</option>
                </optgroup>
            </select>

            <label>Difficulty</label>
            <select name="difficulty" required>
                <option value="" disabled selected>Select Difficulty</option>
                <option value="Easy">Easy</option>
                <option value="Medium">Medium</option>
                <option value="Hard">Hard</option>
            </select>

            <label>Total Questions</label>
            <input type="number" name="num_questions" value="10" min="10" max="50" required>

            <!-- STATUS MESSAGE -->
            <p id="statusMessage" class="status-message hidden"></p>

            <button type="submit" id="generateBtn">Generate & Download</button>
        </form>
    </div>
</div>

<!-- LOADER (FORCE HIDDEN) -->
<div id="loader" class="loader hidden" style="display:none;">
    <div class="spinner"></div>

    <div class="progress-container">
        <div id="progressBar" class="progress-bar"></div>
    </div>

    <p id="progressText">Initializing...</p>
</div>

<script>
const form = document.getElementById("mcqForm");
const loader = document.getElementById("loader");
const btn = document.getElementById("generateBtn");
const statusMessage = document.getElementById("statusMessage");

const progressBar = document.getElementById("progressBar");
const progressText = document.getElementById("progressText");

let progress = 0;
let interval = null;

/* FORCE loader hidden on page load */
document.addEventListener("DOMContentLoaded", function () {
    loader.classList.add("hidden");
    loader.style.display = "none";
});

/* Progress stages */
const stages = [
    { limit: 20, text: "Connecting to server..." },
    { limit: 40, text: "Analyzing topics..." },
    { limit: 65, text: "Generating MCQs..." },
    { limit: 85, text: "Validating questions..." },
    { limit: 100, text: "Creating Excel file..." }
];

/* Smooth progress */
function simulateProgress() {
    progress = 10;
    updateUI(progress);

    return setInterval(() => {
        if (progress < 90) {
            progress += 2;
            updateUI(progress);
        }
    }, 500);
}

/* Update UI */
function updateUI(value) {
    progressBar.style.width = value + "%";

    for (let stage of stages) {
        if (value <= stage.limit) {
            progressText.innerText = stage.text;
            break;
        }
    }
}

/* Form submit */
form.addEventListener("submit", async function (e) {
    e.preventDefault();

    /* SHOW LOADER */
    loader.classList.remove("hidden");
    loader.style.display = "flex";

    btn.disabled = true;
    btn.innerText = "Generating...";

    statusMessage.classList.add("hidden");
    statusMessage.classList.remove("status-success", "status-error");

    progress = 0;
    interval = simulateProgress();

    const formData = new FormData(form);

    try {
        const response = await fetch("/api/v1/mcq/generate-download", {
            method: "POST",
            body: formData
        });

        if (!response.ok) {
            throw new Error("Server error");
        }

        const blob = await response.blob();

        let filename = "mcqs.xlsx";
        const contentDisposition = response.headers.get("Content-Disposition");

        if (contentDisposition && contentDisposition.includes("filename")) {
            const match = contentDisposition.match(/filename="?([^"]+)"?/);
            if (match) filename = match[1];
        }

        /* DOWNLOAD FILE */
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement("a");

        a.href = url;
        a.setAttribute("download", filename);
        document.body.appendChild(a);
        a.click();

        setTimeout(() => {
            window.URL.revokeObjectURL(url);
            a.remove();
        }, 100);

        /* SUCCESS */
        clearInterval(interval);
        updateUI(100);
        progressText.innerText = "Download Complete 🎉";

        statusMessage.classList.remove("hidden");
        statusMessage.classList.add("status-success");
        statusMessage.innerText = "Download Complete 🎉";

        setTimeout(() => resetUI(), 3000);

    } catch (err) {

        /* ERROR */
        clearInterval(interval);
        progressText.innerText = "Error occurred ❌";

        statusMessage.classList.remove("hidden");
        statusMessage.classList.add("status-error");
        statusMessage.innerText = "Error occurred ❌";

        setTimeout(() => resetUI(), 3500);
    }
});

/* Reset UI */
function resetUI() {
    loader.classList.add("hidden");
    loader.style.display = "none";

    btn.disabled = false;
    btn.innerText = "Generate & Download";

    progressBar.style.width = "0%";
    progressText.innerText = "Initializing...";

    setTimeout(() => {
        statusMessage.classList.add("hidden");
    }, 3000);
}
</script>

</body>
</html>
